<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family: Arial;
background:#1e1e1e;
color:white;
text-align:center;
padding:40px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
background:#2ea6ff;
border:none;
border-radius:8px;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<h2>Форма заявки</h2>

<input id="name" placeholder="Ваше имя">

<input id="text" placeholder="Сообщение">

<button onclick="sendData()">Отправить</button>

<script>

function sendData(){

let name=document.getElementById("name").value;
let text=document.getElementById("text").value;

let data={
name:name,
text:text
};

Telegram.WebApp.sendData(JSON.stringify(data));

}

</script>

</body>
</html>
